<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Axios CRUD</title>
    <link rel="stylesheet" href="../style.css">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

<header>
    <h1>Web programozás-1 Előadás Házi feladat</h1>
    <p>Mozi adatbázis webalkalmazás</p>
</header>

<nav>
    <a href="../index.html">Főoldal</a>
    <a href="../javascript/javascript.html">JavaScript</a>
    <a href="../react/react.html">React</a>
    <a href="../spa/spa.html">SPA</a>
    <a href="../fetchapi/fetchapi.html">Fetch API</a>
    <a href="axios.html">Axios</a>
    <a href="../oojs/oojs.html">OO JavaScript</a>
</nav>

<main>
    <h2>Axios CRUD (React + szerver adatbázis)</h2>

    <div id="root"></div>
</main>

<footer>
    <p>Készítette:</p>
    <p>Kovács Kevin Izsák - LXK94M</p>
    <p>Jantyik Róbert - H8O0EL</p>
</footer>

<script type="text/babel">

const API = "../backend/api.php";

function App() {
    const [films, setFilms] = React.useState([]);
    const [form, setForm] = React.useState({ cim: "", ev: "", hossz: "" });

    React.useEffect(() => {
        loadFilms();
    }, []);

    async function loadFilms() {
        const res = await axios.get(API);
        setFilms(res.data);
    }

    async function addFilm() {
        await axios.post(API, form);
        setForm({ cim: "", ev: "", hossz: "" });
        loadFilms();
    }

    async function updateFilm(index, field, value) {
        const copy = [...films];
        copy[index][field] = value;

        await axios.put(API, copy[index]);
        loadFilms();
    }

    async function deleteFilm(id) {
        await axios.delete(API + "?id=" + id);
        loadFilms();
    }

    return (
        <div>
            <div className="form">
                <input
                    placeholder="Cím"
                    value={form.cim}
                    onChange={e => setForm({ ...form, cim: e.target.value })}
                />
                <input
                    placeholder="Év"
                    value={form.ev}
                    onChange={e => setForm({ ...form, ev: e.target.value })}
                />
                <input
                    placeholder="Hossz"
                    value={form.hossz}
                    onChange={e => setForm({ ...form, hossz: e.target.value })}
                />
                <button onClick={addFilm}>Hozzáadás</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cím</th>
                        <th>Év</th>
                        <th>Hossz</th>
                        <th>Művelet</th>
                    </tr>
                </thead>

                <tbody>
                    {films.map((f, i) => (
                        <tr key={f.id}>
                            <td>{f.id}</td>

                            <td contentEditable suppressContentEditableWarning
                                onBlur={e => updateFilm(i, "cim", e.target.innerText)}>
                                {f.cim}
                            </td>

                            <td contentEditable suppressContentEditableWarning
                                onBlur={e => updateFilm(i, "ev", e.target.innerText)}>
                                {f.ev}
                            </td>

                            <td contentEditable suppressContentEditableWarning
                                onBlur={e => updateFilm(i, "hossz", e.target.innerText)}>
                                {f.hossz}
                            </td>

                            <td>
                                <button onClick={() => deleteFilm(f.id)}>
                                    Törlés
                                </button>
                            </td>
                        </tr>
                    ))}
                </tbody>
            </table>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
